 colerico:{reflexao:"Você vive para o que ainda vai conquistar — mas a riqueza que você já possui merece atenção. Hoje, reconheça a abundância do que já está em você.",carta:"Filha, antes de correr para o próximo nível, olha o que já carregas. Dons, força, caráter conquistado — isso é abundância real.",versiculo:"\"O Senhor é o meu pastor e nada me faltará.\" — Salmos 23:1",declaracao:"Reconheço a abundância que já tenho — sou rica em dons e caráter."},
 fleumatico:{reflexao:"Você é contente por natureza — mas às vezes confunde contentamento com acomodação. Hoje, seja grata pelo que tem E aberta para receber mais.",carta:"Filha, o contentamento que tens é dom. Mas quero que estejas aberta para mais — mais do que consideras suficiente.",versiculo:"\"Eu vim para que tenham vida em abundância.\" — João 10:10",declaracao:"Sou contente e aberta — grata pelo que tenho e receptiva ao mais."}},

{dia:46,tema:"Verdade que liberta",
 melancolico:{reflexao:"Você busca a verdade com profundidade — mas às vezes a verdade sobre si mesma é mais difícil de aceitar. Hoje, acolha uma verdade sobre você que tem evitado.",carta:"Filha, a verdade sobre ti mesma — incluindo as partes difíceis — não te destrói. Me traz a ela. Nós a encaramos juntas.",versiculo:"\"Conhecereis a verdade, e a verdade vos libertará.\" — João 8:32",declaracao:"Acolho a verdade sobre mim mesma — ela liberta, não destrói."},
 sanguineo:{reflexao:"Você prefere a leveza às verdades difíceis — mas evitar a verdade tem um custo. Hoje, seja honesta com Deus sobre algo que você tem minimizado.",carta:"Filha, hoje te peço honestidade real — não a versão leve. Só a verdade. Com Mim, você pode.",versiculo:"\"O Senhor está perto de todos os que o invocam em verdade.\" — Salmos 145:18",declaracao:"Sou honesta com Deus — a verdade crua é o caminho para a liberdade."},
 colerico:{reflexao:"Você diz verdades difíceis para os outros com facilidade — mas como você lida com as verdades difíceis sobre si mesma? Hoje, seja tão honesta consigo quanto você é com os outros.",carta:"Filha, aplica a ti mesma o mesmo padrão de honestidade que exiges dos outros.",versiculo:"\"Compra a verdade e não a vendas.\" — Provérbios 23:23",declaracao:"Sou honesta comigo mesma — aplico a mim o que exijo dos outros."},
 fleumatico:{reflexao:"Você evita verdades difíceis para preservar a paz — mas a paz construída sobre verdades não ditas é frágil. Hoje, diga uma verdade que você tem guardado.",carta:"Filha, a paz que evita a verdade não é paz — é superfície. A paz real pode conviver com verdades difíceis. Hoje, diz uma.",versiculo:"\"Dizei cada um a verdade ao seu próximo.\" — Efésios 4:25",declaracao:"Digo verdades difíceis com paz — a verdade e a paz convivem."}},

{dia:47,tema:"A presença de Deus no sofrimento",
 melancolico:{reflexao:"Você conhece o sofrimento de dentro — e às vezes nele parece que Deus se afastou. Mas é nos momentos mais escuros que Ele está mais perto. Ele é o Deus que desce ao poço.",carta:"Filha, nos teus momentos mais escuros, Eu não estava longe — estava mais perto do que nunca. Sou o Deus que desce ao poço antes de levantar.",versiculo:"\"Ainda que eu andasse pelo vale da sombra da morte, não temeria mal nenhum.\" — Salmos 23:4",declaracao:"Deus está no meu sofrimento — Ele desce antes de levantar."},
 sanguineo:{reflexao:"Quando a tristeza chega, você tende a fugir para a alegria rápida. Mas às vezes o sofrimento tem algo a ensinar. Hoje, sente com Deus no desconforto.",carta:"Filha, não fujas do desconforto hoje. Fica nele comigo por um momento. Prometo estar lá.",versiculo:"\"Bem-aventurados os que choram, porque eles serão consolados.\" — Mateus 5:4",declaracao:"Fico com Deus no desconforto — Ele consola os que choram."},
 colerico:{reflexao:"No sofrimento, sua tendência é agir — resolver, superar, seguir. Mas às vezes Deus quer que você fique no sofrimento o tempo suficiente para ser transformada por ele.",carta:"Filha, não resolvas este sofrimento ainda. Fica nele comigo por um pouco mais. Há algo sendo formado em ti que a resolução rápida interromperia.",versiculo:"\"A tribulação produz perseverança.\" — Romanos 5:3",declaracao:"Permaneço no sofrimento o tempo necessário — ele me forma."},
 fleumatico:{reflexao:"Você absorve o sofrimento em silêncio — e isso pode virar um peso acumulado. Hoje, traga o que carregou em silêncio para a presença de Deus.",carta:"Filha, tudo o que suportaste calada — traz a Mim hoje. Eu aguento o peso que tu absorveste.",versiculo:"\"Lançai sobre Ele toda a vossa ansiedade.\" — 1 Pedro 5:7",declaracao:"Trago meu sofrimento silencioso a Deus — Ele aguenta o que carrego."}},

{dia:48,tema:"Amor próprio como ato de fé",
 melancolico:{reflexao:"Cuidar de si mesma parece egoísta para você — mas Jesus disse para amar o próximo como a si mesmo. Isso pressupõe que você se ame. Amor próprio não é vaidade; é obediência.",carta:"Filha, quando te tratas com gentileza, honras o que Eu criei. Cuidar de ti não é egoísmo — é reconhecer que o que Eu fiz tem valor.",versiculo:"\"Amarás o teu próximo como a ti mesmo.\" — Mateus 22:39",declaracao:"Amor próprio é ato de fé — honro o que Deus criou quando me cuido."},
 sanguineo:{reflexao:"Você cuida muito dos outros — mas às vezes negligencia a si mesma. Amor próprio não é egoísmo; é sustentabilidade. Você não pode dar o que não tem.",carta:"Filha, cuidas tão bem dos outros. Mas hoje, cuida de ti. Você só pode dar o que tem.",versiculo:"\"Guarda a tua alma com todo o cuidado.\" — Deuteronômio 4:9",declaracao:"Cuido de mim para poder cuidar dos outros — amor próprio é sustentabilidade."},
 colerico:{reflexao:"Você é dura consigo mesma — padrões altos, pouca clemência para os próprios erros. Hoje, seja para si mesma pelo menos tão gentil quanto você seria com alguém que ama.",carta:"Filha, como tratarias uma amiga que errou como tu erraste? Agora trata-te a ti mesma assim.",versiculo:"\"Amarás o teu próximo como a ti mesmo.\" — Marcos 12:31",declaracao:"Sou gentil comigo — aplico o mesmo amor que daria a uma amiga."},
 fleumatico:{reflexao:"Você cuida de todos — mas raramente de si mesma. Hoje, faça um gesto simples de autocuidado: descanse, coma bem, faça algo que te dê alegria.",carta:"Filha, quem cuida de todos precisa também ser cuidada. Hoje, cuida de ti — com a mesma atenção que dás aos que amas.",versiculo:"\"Amado, oro que em tudo te vá bem.\" — 3 João 2",declaracao:"Me cuido com amor — meu bem-estar importa para Deus."}},

{dia:49,tema:"Legado de fé",
 melancolico:{reflexao:"Você constrói para durar — seus relacionamentos, suas obras, sua fé têm profundidade que atravessa o tempo. Hoje, pense no legado que está construindo, não como fardo, mas como presente.",carta:"Filha, o que constróis em profundidade — na fé, nas relações, na tua vida interior — é legado que toca gerações.",versiculo:"\"Os filhos de teus filhos verão os teus feitos.\" — Salmos 102:18",declaracao:"Construo um legado de fé — o que faço em profundidade atravessa o tempo."},
 sanguineo:{reflexao:"Você deixa marcas de alegria onde passa — e isso também é legado. Cada pessoa que você encorajou, animou, conectou carrega algo seu.",carta:"Filha, tuas marcas de alegria e conexão nas vidas das pessoas são legado real. Pensas que são momentos passageiros — mas eles ficam.",versiculo:"\"A memória do justo é abençoada.\" — Provérbios 10:7",declaracao:"Deixo legado de alegria — minhas marcas nas pessoas permanecem."},
 colerico:{reflexao:"Você pensa em impacto — mas legado real vai além dos resultados visíveis. É o caráter que você forma em quem lidera, os valores que transmite.",carta:"Filha, o maior impacto que deixarás não é o que construíste, mas quem formaste. Que tipo de pessoas saem melhores por terem passado por ti?",versiculo:"\"O justo anda em sua integridade; felizes são seus filhos depois dele.\" — Provérbios 20:7",declaracao:"Deixo legado de caráter — quem convive comigo sai transformado."},
 fleumatico:{reflexao:"Seu legado é a paz que você estabeleceu — nos lares, nos relacionamentos, nas situações de conflito que você pacificou.",carta:"Filha, a paz que trouxeste a cada situação, a cada lar, a cada relacionamento — persiste. O teu legado é a harmonia que não existiria sem ti.",versiculo:"\"Bem-aventurados os pacificadores.\" — Mateus 5:9",declaracao:"Deixo legado de paz — a harmonia que estabeleço persiste."}},

{dia:50,tema:"Renovação do propósito",
 melancolico:{reflexao:"Periodicamente, o propósito precisa ser relembrado — não porque mudou, mas porque o cotidiano pode obscurecê-lo. Hoje, relembre com clareza por que você está aqui.",carta:"Filha, hoje te convido a voltar ao fundamental: por que és aqui? Qual a centelha que Eu coloquei em ti desde o princípio? Ela ainda está acesa.",versiculo:"\"Fui formado para isso.\" — João 18:37",declaracao:"Meu propósito permanece claro — volto a ele quando o cotidiano obscurece."},
 sanguineo:{reflexao:"Você tem muitos entusiasmos — mas o propósito central precisa ser clarificado periodicamente. Hoje, pergunte: além de animar, para que fui especificamente criada?",carta:"Filha, a alegria que tens é veículo — não destino. Para onde ela está te levando?",versiculo:"\"Para isso fui enviada.\" — João 20:21",declaracao:"Busco o propósito abaixo da animação — sou enviada com missão específica."},
 colerico:{reflexao:"Você corre para os objetivos — mas renovar o propósito é verificar se os objetivos apontam para o lugar certo. Hoje, alinhe seus objetivos com o propósito de Deus.",carta:"Filha, antes de correr para o próximo objetivo, verifica: está alinhado com o propósito que te dei?",versiculo:"\"Corro para o alvo, para o prêmio da soberana vocação de Deus.\" — Filipenses 3:14",declaracao:"Verifico o alvo — meus objetivos estão alinhados com o propósito de Deus."},
 fleumatico:{reflexao:"Você vive o propósito na constância — mas renovar a consciência dele periodicamente dá nova energia à fidelidade. Hoje, lembre-se intencionalmente para que você está aqui.",carta:"Filha, a fidelidade que mostras dia após dia tem um propósito por trás. Hoje, lembra-o conscientemente.",versiculo:"\"Andai como é digno do chamamento com que fostes chamados.\" — Efésios 4:1",declaracao:"Renovo a consciência do meu propósito — isso energiza minha constância."}},
{dia:51,tema:"Confiança renovada",
 melancolico:{reflexao:"A confiança em Deus não é ausência de dúvida — é escolher confiar apesar da dúvida. Você pode ter perguntas e ainda assim confiar no Deus que as aguenta.",carta:"Filha, podes ter perguntas e ainda assim confiar em Mim. As duas coisas podem existir juntas. Eu aguento tuas dúvidas sem Me abalar.",versiculo:"\"Confia no Senhor de todo o teu coração.\" — Provérbios 3:5",declaracao:"Confio em Deus com minhas dúvidas — as duas coisas convivem."},
 sanguineo:{reflexao:"Você confia com facilidade — mas quando algo decepciona, a confiança vacila. Hoje, renove a confiança em Deus que é fiel mesmo quando as circunstâncias mudam.",carta:"Filha, as circunstâncias que decepcionam não Me mudam. Eu sou o mesmo — fiel, bom, presente.",versiculo:"\"Deus é fiel, pelo qual fostes chamados.\" — 1 Coríntios 1:9",declaracao:"Renovo minha confiança em Deus — Ele é fiel além das circunstâncias."},
 colerico:{reflexao:"Para você, confiança precisa ser ganha com evidência. Mas fé é confiar antes da evidência chegar. Hoje, renove a confiança em Deus além do que você pode provar.",carta:"Filha, hoje te convido a confiar antes da evidência — baseada não nos resultados, mas no Meu caráter.",versiculo:"\"Aquele em quem confio.\" — 2 Timóteo 1:12",declaracao:"Confio no caráter de Deus antes de ver a evidência."},
 fleumatico:{reflexao:"Você confia de forma tranquila — mas às vezes a confiança é mais passividade do que fé ativa. Hoje, renove a confiança ativamente: declare em voz alta que confia em Deus.",carta:"Filha, a confiança que carregas tranquilamente — declara-a hoje. Em voz alta, com intenção.",versiculo:"\"Eu confio em ti, ó Senhor.\" — Salmos 31:14",declaracao:"Declaro minha confiança em Deus — a fé declarada tem poder."}},

{dia:52,tema:"Paz que supera",
 melancolico:{reflexao:"A paz de Deus não é ausência de análise — é a capacidade de analisar sem perder o chão. Você pode pensar profundamente E descansar em Deus ao mesmo tempo.",carta:"Filha, te ofereço uma paz que não exige que pares de pensar — apenas que âncores os pensamentos em Mim.",versiculo:"\"A paz de Deus que excede todo entendimento.\" — Filipenses 4:7",declaracao:"Analiso com paz — minha profundidade está ancorada em Deus."},
 sanguineo:{reflexao:"Você busca paz às vezes no movimento, na conexão, na animação. Mas a paz que supera o entendimento vem de dentro, não de fora. Hoje, encontre a paz interna.",carta:"Filha, a paz que te ofereço não depende de circunstâncias externas. Está dentro de ti — disponível mesmo no caos.",versiculo:"\"A minha paz vos dou.\" — João 14:27",declaracao:"Acesso a paz interna — ela está disponível independente das circunstâncias."},
 colerico:{reflexao:"A paz é difícil para você — há sempre algo urgente demandando atenção. Mas a paz de Deus não é ausência de urgência; é a capacidade de estar urgente sem estar ansiosa.",carta:"Filha, a paz que te ofereço não exige que pares de agir — exige que âncores tua ação em Mim.",versiculo:"\"Em nada vos inquieteis.\" — Filipenses 4:6",declaracao:"Ajo com paz — urgência e tranquilidade podem coexistir em Deus."},
 fleumatico:{reflexao:"Você tem paz exterior — mas a paz profunda de Deus vai além da ausência de conflito. É uma paz que persiste mesmo quando as circunstâncias perturbam.",carta:"Filha, a paz que carregas é real — mas há ainda mais disponível. Uma paz que persiste no meio do conflito.",versiculo:"\"Paz, aquieta-te.\" — Marcos 4:39",declaracao:"Tenho paz que vai além da ausência de conflito — persiste no meio dele."}},

{dia:53,tema:"Integridade no oculto",
 melancolico:{reflexao:"Você é muito mais íntegra quando ninguém está olhando do que quando estão — porque você se julga pela régua mais alta. Hoje, celebre essa integridade interior que poucas pessoas veem.",carta:"Filha, vejo o que ninguém vê — a honestidade nos teus pensamentos, a justiça que praticas no silêncio.",versiculo:"\"Os olhos do Senhor estão em todo lugar.\" — Provérbios 15:3",declaracao:"Sou íntegra no oculto — Deus vê e honra o que é feito em silêncio."},
 sanguineo:{reflexao:"Você brilha publicamente — mas integridade é quem você é quando ninguém está olhando. Hoje, verifique: sua vida pública e sua vida particular estão alinhadas?",carta:"Filha, quero que tua vida privada e pública sejam a mesma. A integridade é ser a mesma pessoa em todos os lugares.",versiculo:"\"Quem caminha em integridade anda com segurança.\" — Provérbios 10:9",declaracao:"Sou a mesma pessoa em público e em particular — isso é integridade."},
 colerico:{reflexao:"Você cobra alto padrão dos outros — mas hoje, observe seus próprios bastidores. Integridade não é perfeição; é consistência entre o que você prega e o que pratica.",carta:"Filha, o padrão que exiges dos outros — exiges de ti mesma nos momentos que ninguém vê?",versiculo:"\"Aquele que é fiel no mínimo, também é fiel no muito.\" — Lucas 16:10",declaracao:"Pratico o que prego — minha integridade começa no mínimo."},
 fleumatico:{reflexao:"Você tende a ser consistente — e essa consistência silenciosa é integridade em ação. Hoje, reconheça o valor dessa constância que raramente é aplaudida mas sempre é notada por Deus.",carta:"Filha, tua consistência dia após dia — sem alarde, sem plateia — é uma das formas mais belas de integridade.",versiculo:"\"O justo anda em sua integridade.\" — Provérbios 20:7",declaracao:"Minha consistência silenciosa é integridade — Deus vê cada dia fiel."}},

{dia:54,tema:"Dom da criatividade",
 melancolico:{reflexao:"Você foi criada com um senso estético e criativo profundo. Essa criatividade não é vaidade — é reflexo do Deus Criador que habita em você. Hoje, crie algo — mesmo que pequeno.",carta:"Filha, quando criares, estás refletindo algo de Mim. Sou o Criador original — e tu carregas essa centelha.",versiculo:"\"No princípio criou Deus.\" — Gênesis 1:1",declaracao:"Minha criatividade é reflexo de Deus — quando crio, O glorifico."},
 sanguineo:{reflexao:"Você tem ideias brilhantes o tempo todo — mas às vezes não as concretiza. Hoje, escolha uma e faça. Uma ideia executada vale mais do que cem admiradas.",carta:"Filha, tuas ideias me encantam. Hoje, pega uma e faz. O mundo precisa não da ideia guardada, mas da ideia realizada.",versiculo:"\"Tudo o que a tua mão encontrar para fazer, faze-o com todo o teu empenho.\" — Eclesiastes 9:10",declaracao:"Executo uma ideia hoje — criatividade em ação transforma o mundo."},
 colerico:{reflexao:"Você cria com propósito — e isso tem valor. Mas hoje, crie sem propósito estratégico. Apenas por alegria, por expressão, por amor ao processo.",carta:"Filha, hoje cria sem agenda. Sem objetivo mensurável. Só pelo prazer de criar.",versiculo:"\"E viu Deus tudo quanto tinha feito, e eis que era muito bom.\" — Gênesis 1:31",declaracao:"Crio com alegria — o processo em si tem valor, não só o resultado."},
 fleumatico:{reflexao:"Você tem criatividade que raramente é expressa — fica guardada por dentro. Hoje, expresse algo criativo de uma forma pequena.",carta:"Filha, a criatividade que guardas dentro de ti quer sair. Não precisas de grandes palcos — só de uma pequena expressão hoje.",versiculo:"\"Toda boa dádiva e todo dom perfeito vem do alto.\" — Tiago 1:17",declaracao:"Expresso minha criatividade — ela foi colocada em mim por Deus."}},

{dia:55,tema:"Desapego do que não é seu",
 melancolico:{reflexao:"Você carrega o peso dos outros como se fosse o seu. Hoje, pratique o desapego amoroso: você pode se importar profundamente sem precisar resolver tudo.",carta:"Filha, és empática demais para não sentir a dor dos outros. Mas hoje, distingue: o que é teu para carregar e o que é para entregar a Mim.",versiculo:"\"Lançai sobre Ele toda a vossa ansiedade, porque Ele tem cuidado de vós.\" — 1 Pedro 5:7",declaracao:"Distinguo o que é meu e o que é de Deus — entrego o que não me pertence."},
 sanguineo:{reflexao:"Você se envolve com facilidade nas situações dos outros — e isso é belo. Mas às vezes você absorve problemas que não são seus. Hoje, pratique o desapego gentil.",carta:"Filha, podes amar sem precisar resolver. Podes estar presente sem precisar carregar.",versiculo:"\"Cada um carregará o seu próprio fardo.\" — Gálatas 6:5",declaracao:"Amo sem carregar o que não é meu — cada um tem seu fardo."},
 colerico:{reflexao:"Você quer resolver tudo — e às vezes assume responsabilidades que não são suas. Hoje, entregue algo que você está carregando mas que pertence a outra pessoa.",carta:"Filha, não és responsável por tudo. Hoje, identifica algo que assumiste que não era teu para carregar.",versiculo:"\"O fruto do Espírito é amor, alegria, paz.\" — Gálatas 5:22",declaracao:"Solto o que não é meu — liberto a mim e ao outro."},
 fleumatico:{reflexao:"Você absorve o que os outros sentem — e às vezes não sabe onde começa você e onde termina o outro. Hoje, estabeleça uma fronteira gentil.",carta:"Filha, podes sentir junto sem se perder no sentimento do outro. Hoje, distingue: o que é teu e o que é dele.",versiculo:"\"Guardai os vossos corações acima de tudo.\" — Provérbios 4:23",declaracao:"Cuido do meu coração — me importo sem me perder no outro."}},

{dia:56,tema:"Hospitalaridade do coração",
 melancolico:{reflexao:"Você tem um coração hospitaleiro internamente — mas às vezes fechar a porta é mais fácil do que abrir. Hoje, abra um pouco mais. Não para todos — para alguém.",carta:"Filha, hoje te convido a abrir teu coração para alguém específico que tens mantido à distância.",versiculo:"\"Sede hospitaleiros uns para com os outros, sem murmuração.\" — 1 Pedro 4:9",declaracao:"Abro meu coração para quem Deus coloca no meu caminho."},
 sanguineo:{reflexao:"Você é naturalmente hospitaleira — sua casa e seu coração estão sempre abertos. Hoje, seja hospitaleira com quem está no limite: aquele que não é fácil de amar.",carta:"Filha, tua hospitalidade é linda. Hoje, estende ela para além das pessoas fáceis — para aquela que exige mais de ti.",versiculo:"\"Quando fizestes isso a um destes meus pequeninos irmãos, a Mim o fizestes.\" — Mateus 25:40",declaracao:"Estendo hospitalidade além do fácil — amo quem é difícil de amar."},
 colerico:{reflexao:"Você é eficiente em receber — mas às vezes recebe para servir mais do que para conectar. Hoje, seja hospitaleira de coração: receba sem agenda.",carta:"Filha, hoje recebe sem pauta. Sem o que quer alcançar. Só presença.",versiculo:"\"Abri amplamente o nosso coração.\" — 2 Coríntios 6:11",declaracao:"Recebo sem agenda — hospitalidade do coração é presença pura."},
 fleumatico:{reflexao:"Seu lar e seu coração são portos seguros — e isso é um dom precioso. Hoje, expresse essa hospitalidade de forma ativa: convide alguém.",carta:"Filha, teu coração já é hospitaleiro. Hoje, expressa isso com uma ação — um convite, um espaço aberto intencionalmente.",versiculo:"\"Amai a hospitalidade.\" — Romanos 12:13",declaracao:"Expresso hospitalidade ativamente — convido e abro espaço com intenção."}},

{dia:57,tema:"Semear para o futuro",
 melancolico:{reflexao:"Cada devocional, cada oração, cada momento de reflexão é uma semente plantada no tempo. Você não vê toda a colheita — mas ela vem. Continue semeando.",carta:"Filha, o que semeaste em fé ao longo desses dias está crescendo — mesmo onde não podes ver.",versiculo:"\"O que semeia em bênçãos, também em bênçãos ceifará.\" — 2 Coríntios 9:6",declaracao:"Semeo com fé — a colheita vem mesmo onde não posso ver."},
 sanguineo:{reflexao:"Cada alegria compartilhada, cada encorajamento dado, cada conexão feita em amor — são sementes que voltam multiplicadas. Continue semeando alegria.",carta:"Filha, cada sorriso que espalhaste, cada palavra que animou — são sementes que voltam para ti multiplicadas.",versiculo:"\"Dai e ser-vos-á dado.\" — Lucas 6:38",declaracao:"Semeo alegria e amor — colheita multiplicada virá."},
 colerico:{reflexao:"Cada ação fiel, cada projeto bem construído, cada pessoa que você ajudou a crescer — são sementes de um legado. Continue semeando com propósito.",carta:"Filha, o impacto do que construíste com fidelidade vai além do que podes medir.",versiculo:"\"Não nos cansemos de fazer o bem.\" — Gálatas 6:9",declaracao:"Semeo com propósito — o impacto do que construo tem dimensão eterna."},
 fleumatico:{reflexao:"Cada dia fiel, cada presença oferecida, cada paz estabelecida — são sementes de um impacto silencioso mas real. Continue sendo presença fiel.",carta:"Filha, cada dia fiel que viveste é uma semente de algo maior.",versiculo:"\"A semente crescia e se desenvolvia.\" — Marcos 4:27",declaracao:"Semeo com presença fiel — cada dia constante é semente de algo maior."}},

{dia:58,tema:"Gratidão que transforma",
 melancolico:{reflexao:"A gratidão tem um efeito concreto na mente — ela literalmente muda o que a mente processa. Para você, que tende ao peso, a prática da gratidão é uma das ferramentas mais poderosas.",carta:"Filha, hoje te dou um exercício: escreve cinco coisas boas do dia de ontem. Não porque tudo foi bom — mas porque havia bem mesmo assim.",versiculo:"\"Dai graças em tudo.\" — 1 Tessalonicenses 5:18",declaracao:"A gratidão transforma minha mente — vejo o bem mesmo nos dias difíceis."},
 sanguineo:{reflexao:"Você tem gratidão natural — mas aprofundá-la muda sua qualidade. Hoje, vá além da gratidão pelas bênçãos e agradeça pelas provações que te formaram.",carta:"Filha, hoje te convido a uma gratidão avançada: agradecer pelo que foi difícil. Pelo que te formou enquanto doía.",versiculo:"\"Dar graças em tudo.\" — 1 Tessalonicenses 5:18",declaracao:"Agradeço até pelas dificuldades — elas me formaram."},
 colerico:{reflexao:"Gratidão desacelera — e para você isso é valioso. Hoje, antes de ir para o próximo item da lista, pause para agradecer pelo que acabou de ser completado.",carta:"Filha, entre cada conquista e a próxima — agradeça. Esse momento de pausa te conecta a Mim.",versiculo:"\"Em tudo dei graças.\" — Filipenses 4:11",declaracao:"Agradeço entre conquistas — a gratidão me conecta a Deus no caminho."},
 fleumatico:{reflexao:"Você é grata internamente — mas expressar a gratidão em voz alta ou por escrito amplifica seu poder. Hoje, expresse uma gratidão específica de forma ativa.",carta:"Filha, a gratidão guardada tem valor — mas a declarada tem mais poder. Hoje, diz em voz alta ou escreve uma coisa específica pela qual és grata.",versiculo:"\"O Senhor fez grandes coisas por nós.\" — Salmos 126:3",declaracao:"Declaro minha gratidão — expressa em voz alta tem poder multiplicado."}},

{dia:59,tema:"Fidelidade que persiste",
 melancolico:{reflexao:"Você é fiel — mas às vezes a intensidade da fidelidade te esgota. Fidelidade sustentável não é maximizar sempre; é manter o essencial mesmo nos dias de menos.",carta:"Filha, fidelidade não é dar tudo o tempo todo. É dar o que tens, quando tens, na medida do que podes.",versiculo:"\"A tua fidelidade permanece para sempre.\" — Salmos 119:90",declaracao:"Sou fiel no possível — fidelidade sustentável persiste mais que a intensa."},
 sanguineo:{reflexao:"Sua fidelidade é maior nos começos e nas celebrações — mas Deus te chama à fidelidade no meio, quando a empolgação foi embora.",carta:"Filha, a fidelidade no meio — quando a animação foi mas o compromisso fica — é onde o caráter real é formado.",versiculo:"\"Sede fiéis até à morte.\" — Apocalipse 2:10",declaracao:"Sou fiel no meio — quando a empolgação foi, meu compromisso fica."},
 colerico:{reflexao:"Você é fiel nos grandes projetos — mas às vezes menos fiel nos pequenos compromissos cotidianos. Hoje, seja fiel em algo pequeno que você tende a negligenciar.",carta:"Filha, os grandes projetos precisam da fidelidade nos pequenos detalhes.",versiculo:"\"Quem é fiel no mínimo também é fiel no muito.\" — Lucas 16:10",declaracao:"Sou fiel no pequeno — é aqui que a grande fidelidade é construída."},
 fleumatico:{reflexao:"Você é naturalmente fiel — mas às vezes a fidelidade é por inércia, não por escolha ativa. Hoje, seja fiel por escolha: decida permanecer, não apenas permaneça.",carta:"Filha, hoje quero que tua fidelidade seja uma escolha renovada. Decide permanecer — não porque é difícil ir, mas porque escolhes ficar.",versiculo:"\"Quem perseverar até ao fim será salvo.\" — Mateus 24:13",declaracao:"Sou fiel por escolha — decido permanecer ativamente."}},

{dia:60,tema:"Tempo com Deus como prioridade",
 melancolico:{reflexao:"Para você, o tempo com Deus muitas vezes é o melhor do dia — mas você o coloca para o fim, depois de tudo estar resolvido. Hoje, ponha-o no início.",carta:"Filha, quando Me buscas primeiro, o resto do dia tem uma tonalidade diferente. Hoje, começa por Mim.",versiculo:"\"De manhã cedo me levantarei a Ti.\" — Salmos 63:1",declaracao:"Priorizo o tempo com Deus — começo por Ele e o resto se alinha."},
 sanguineo:{reflexao:"Você tem muitos compromissos e o tempo com Deus às vezes compete com tudo mais. Hoje, proteja esse tempo como um encontro que não pode ser remarcado.",carta:"Filha, quando Me dás os primeiros momentos do dia, não apenas te beneficias tu — o teu dia inteiro carrega algo diferente.",versiculo:"\"Busca a Deus e viverás.\" — Amós 5:4",declaracao:"Protejo o tempo com Deus — é um encontro que não remarco."},
 colerico:{reflexao:"Você trata o tempo devocional como item da lista de produtividade. Mas ele é muito mais do que isso — é o lugar onde você recebe a estratégia para toda a lista.",carta:"Filha, o tempo comigo não é item de tarefa. É fonte. Quando vens primeiro a Mim, tudo o mais flui com mais eficiência.",versiculo:"\"Buscai primeiro o reino de Deus e a sua justiça.\" — Mateus 6:33",declaracao:"O tempo com Deus é fonte — busco primeiro a Ele e tudo flui melhor."},
 fleumatico:{reflexao:"Você tem rotina com Deus — mas às vezes ela é mais hábito do que encontro. Hoje, venha com expectativa: Deus tem algo específico para você neste momento.",carta:"Filha, vim aqui hoje com algo específico para ti. Não é só rotina — é encontro. Abre o coração com expectativa.",versiculo:"\"Chega-te a Deus e Ele se chegará a ti.\" — Tiago 4:8",declaracao:"Venho ao tempo com Deus com expectativa — Ele tem algo específico para mim."}},

{dia:61,tema:"Forças renovadas",
 melancolico:{reflexao:"Nos momentos de esgotamento, Deus não te pede mais esforço — te pede que venha até Ele. As forças renovadas não vêm do descanso sozinho, mas do descanso em Sua presença.",carta:"Filha, quando estiveres esgotada, não te peço mais um esforço. Te peço que venhas a Mim. Eu sou tua fonte.",versiculo:"\"Os que esperam no Senhor renovarão as suas forças; voarão como águias.\" — Isaías 40:31",declaracao:"Renovo minhas forças em Deus — Ele é minha fonte, não meu esforço."},
 sanguineo:{reflexao:"Você queima energia rápido — e às vezes chega ao fim do dia completamente vazia. Renove suas forças intencionalmente: não só com entretenimento, mas com presença de Deus.",carta:"Filha, o entretenimento alivia — mas só Eu renovo. Hoje, busca renovação de verdade.",versiculo:"\"Ele me reconduz a pastos verdes, me leva a águas tranquilas.\" — Salmos 23:2",declaracao:"Renovo minhas forças na presença de Deus — não só no descanso superficial."},
 colerico:{reflexao:"Você roda na adrenalina — e quando ela acaba, cai. Hoje, aprenda a renovar forças antes de chegar ao colapso. Prevenção é mais eficiente do que recuperação.",carta:"Filha, renova as forças antes de precisar — não depois. Esse é o cuidado estratégico que te peço.",versiculo:"\"Ele fortalece o cansado e aumenta as forças do que não tem vigor.\" — Isaías 40:29",declaracao:"Renovo minhas forças preventivamente — cuido antes de colapsar."},
 fleumatico:{reflexao:"Você preserva energia naturalmente — mas às vezes fica parada demais. Renovação de forças também precisa de movimento: na oração ativa, na Palavra, no serviço que energiza.",carta:"Filha, renovar forças não é só descansar — é também mover-se em Mim. A oração ativa renova tanto quanto o sono.",versiculo:"\"Aguarda o Senhor; tem bom ânimo e Ele fortalecerá o teu coração.\" — Salmos 27:14",declaracao:"Renovo forças em movimento e descanso — os dois são necessários."}},

{dia:62,tema:"Esperança renovada",
 melancolico:{reflexao:"Há momentos em que a esperança parece ter ido embora. Mas esperança em Deus não depende do sentimento de esperança — depende da fidelidade Dele que permanece.",carta:"Filha, quando não sentires esperança, agarra-te à Minha fidelidade — que nunca muda. Ela é a âncora quando o sentimento oscila.",versiculo:"\"Temos uma esperança que penetra até detrás do véu.\" — Hebreus 6:19",declaracao:"Minha esperança está ancorada em Deus — persiste além do sentimento."},
 sanguineo:{reflexao:"Você é naturalmente esperançosa — mas hoje, cultive uma esperança que vai além do otimismo. Uma esperança fundamentada na Palavra de Deus, não nas circunstâncias.",carta:"Filha, hoje planta tua esperança mais fundo — não no que vês, mas no que Eu prometi. Essa esperança não decepciona.",versiculo:"\"A esperança não envergonha.\" — Romanos 5:5",declaracao:"Planto minha esperança na Palavra de Deus — ela não decepciona."},
 colerico:{reflexao:"Você espera resultados — e quando demoram, a esperança vira frustração. Hoje, separe esperança de expectativa de resultado. Esperança em Deus é confiança em Seu caráter.",carta:"Filha, esperança em Mim não é garantia de resultado no teu prazo — é certeza do Meu caráter. Isso é diferente.",versiculo:"\"Aquele que vos chamou é fiel, e assim o fará.\" — 1 Tessalonicenses 5:24",declaracao:"Espero no caráter de Deus — não em resultados no meu prazo."},
 fleumatico:{reflexao:"Você tem esperança tranquila — mas às vezes ela é mais resignação do que expectativa ativa. Hoje, avive sua esperança: declare o que você espera de Deus.",carta:"Filha, aviva tua esperança hoje. Não a guardes em silêncio — declara o que esperas de Mim. Isso tem poder.",versiculo:"\"Que o Deus de esperança vos encha de todo o gozo e paz.\" — Romanos 15:13",declaracao:"Avivo minha esperança — declaro o que espero de Deus."}},

{dia:63,tema:"Ministério da presença",
 melancolico:{reflexao:"Você não precisa ter as respostas para ministrar — às vezes ministrar é simplesmente estar presente com alguém na dor. Isso você faz com maestria.",carta:"Filha, tua presença em silêncio ao lado de quem sofre é ministério real. Não precisas falar — só estar.",versiculo:"\"Estive com vós em fraqueza, e em temor, e em grande tremor.\" — 1 Coríntios 2:3",declaracao:"Minha presença é ministério — não preciso ter respostas, só estar."},
 sanguineo:{reflexao:"Você está presente de muitas formas — mas hoje pratique o ministério da presença silenciosa: estar sem animar, sem resolver, sem preencher o silêncio.",carta:"Filha, hoje pratica estar sem fazer nada além de estar. Esse é um dos ministérios mais difíceis para ti — e mais necessários.",versiculo:"\"Chorai com os que choram.\" — Romanos 12:15",declaracao:"Pratico presença silenciosa — fico sem precisar preencher o vazio."},
 colerico:{reflexao:"Você ministra com ação — mas hoje ministra com presença. Fique com alguém sem ter nada a fazer exceto estar lá.",carta:"Filha, hoje o maior ministério que podes oferecer a alguém é simplesmente estar. Sem agenda, sem solução, só presença.",versiculo:"\"Estando presentes convosco.\" — 2 Coríntios 13:2",declaracao:"Ministro com presença — estar é suficiente, não preciso fazer."},
 fleumatico:{reflexao:"O ministério da presença é o seu mais natural — você já é âncora para quem está perto. Hoje, faça isso de forma ainda mais intencional.",carta:"Filha, teu ministério de presença é real e necessário. Hoje, oferece-o de forma consciente a alguém que precisa.",versiculo:"\"Permaneçamos juntos.\" — Neemias 6:2",declaracao:"Ofereço presença intencional — é meu ministério mais natural e poderoso."}},

{dia:64,tema:"Cuidando da alma",
 melancolico:{reflexao:"Você cuida da alma dos outros com sensibilidade — mas como está a sua? Hoje, faça uma visita à própria alma: o que ela precisa? O que está pesado? O que está florescendo?",carta:"Filha, hoje a pergunta é sobre ti. Como está tua alma? Não a vida — a alma. Traz a resposta para Mim.",versiculo:"\"Como está a tua alma?\" — 3 João 2",declaracao:"Visito minha própria alma — e a que encontro, entrego a Deus."},
 sanguineo:{reflexao:"Você cuida de tudo ao redor — mas a alma precisa de atenção intencional. Hoje, dê à sua alma o que ela está pedindo: silêncio, beleza, profundidade, conexão?",carta:"Filha, tua alma fala — mas às vezes tu não ouves porque estás ocupada. Hoje, para e escuta. O que ela pede?",versiculo:"\"A alma que Me busca encontrará.\" — Jeremias 29:13",declaracao:"Escuto minha alma — ela me diz o que precisa."},
 colerico:{reflexao:"Você cuida da mente e do corpo com estratégia — mas a alma precisa de cuidado diferente. Não pode ser gerenciada, só alimentada. Hoje, alimente sua alma.",carta:"Filha, a alma não se gerencia — se nutre. Hoje, oferece a ela algo que genuinamente a alimenta.",versiculo:"\"Que aproveita ao homem ganhar o mundo inteiro, se perder a sua alma?\" — Mateus 16:26",declaracao:"Alimento minha alma — ela é mais importante que qualquer resultado."},
 fleumatico:{reflexao:"Você tem alma tranquila — mas alma tranquila precisa ser nutrida também. Hoje, faça algo que alimenta sua alma de dentro para fora.",carta:"Filha, tua alma tranquila é linda. Hoje, nutre-a de forma intencional — não por obrigação, mas por amor ao que Eu coloquei em ti.",versiculo:"\"Restaura a minha alma.\" — Salmos 23:3",declaracao:"Nutro minha alma intencionalmente — ela merece o mesmo cuidado que dou aos outros."}},

{dia:65,tema:"Reconciliação",
 melancolico:{reflexao:"Você guarda mágoas profundamente — e a reconciliação pode parecer impossível porque a dor foi real. Mas Deus é o Deus da reconciliação. Ele pode restaurar o que foi partido.",carta:"Filha, sei da dor que houve. Não te peço que faças de conta que não aconteceu. Te peço que abras a porta para o que Eu posso fazer naquele relacionamento.",versiculo:"\"Deus nos reconciliou consigo mesmo por intermédio de Cristo.\" — 2 Coríntios 5:18",declaracao:"Abro a porta para a reconciliação — Deus restaura o que foi partido."},

// Função para obter devocional do dia
function getDevocionaiDoDia() {
  const hoje = new Date();
  const inicio = new Date(hoje.getFullYear(), 0, 0);
  const diff = hoje - inicio;
  const diaDoAno = Math.floor(diff / (1000 * 60 * 60 * 24));
  const idx = (diaDoAno - 1) % DEVOCIONAIS.length;
  return DEVOCIONAIS[idx];
}

🙏 *Oração*

function capitalize(str){
  if(!str) return str;

function mdToHtml(txt){
  return txt.split("\n").map(l=>{
    if(l.trim() === "---") return "";
    if(l.trim() === "") return `<div style="height:10px"></div>`;
    if(l.trim().startsWith("### ")) return `<p style="margin:20px 0 6px;font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:#3a2820;line-height:1.3">${l.trim().replace(/^###\s*/,"")}</p>`;
    if(l.trim().startsWith("## "))  return `<p style="margin:22px 0 6px;font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:#3a2820;line-height:1.3">${l.trim().replace(/^##\s*/,"")}</p>`;
    if(l.trim().startsWith("# "))   return `<p style="margin:24px 0 8px;font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:700;color:#3a2820;line-height:1.3">${l.trim().replace(/^#\s*/,"")}</p>`;
    // Negrito que ocupa a linha INTEIRA vira título de seção
    const soloBlod = l.trim().match(/^\*\*([^*]+)\*\*$/);
    if(soloBlod) return `<p style="margin:18px 0 6px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#3a2820;letter-spacing:0.3px">${soloBlod[1]}</p>`;
    // Negrito inline dentro de texto normal
    const h = l.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>");
    return `<p style="margin:0 0 6px 0;line-height:1.75;font-size:14px">${h}</p>`;
  }).filter(l=>l!=="").join("")
}

async function enviar(){
  const texto = state.input.trim();
  if(!texto || state.loading) return;
  const hist = [...state.msgs, {role:"user",content:texto}];
  setState({msgs:hist, input:"", loading:true});

  // Usa system do diário se for esse módulo
  const sys = (state.modulo?.id === "diario" && state.diarioSys) ? state.diarioSys : buildSystem();

  try {
    const resp = await fetch("/.netlify/functions/claude",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        system:sys,
        messages:hist.map(m=>({role:m.role,content:m.content}))
      })
    });
    const data = await resp.json();
    if(data.error) throw new Error(data.error.message);
    const reply = data?.content?.find(b=>b.type==="text")?.text;
    if(!reply) throw new Error("vazio");
    const novasMsgs = [...hist,{role:"assistant",content:reply}];
    setState({msgs:novasMsgs, loading:false});

    // Salva resposta no diário e volta para tela do diário
    if(state.modulo?.id === "diario" && state.diarioId){
      const notasAtuais = carregarNotas();
      const idx = notasAtuais.findIndex(x => x.id === state.diarioId);
      if(idx !== -1){ notasAtuais[idx].resposta = reply; }
      localStorage.setItem("florzinha_diario", JSON.stringify(notasAtuais));
      state.diarioId = null;
      setState({msgs:novasMsgs, loading:false, tela:"diario", modulo:null});
      return;
    }

    // Auto-salvar histórico de relacionamentos e oração
    if(state.modulo?.id === "proposito" || state.modulo?.id === "oracao"){
      salvarHistorico({
        temperamento: state.tempKey,
        nome: state.nome,
        modulo: state.modulo?.label || "Conversa",
        msgs: novasMsgs,
        resumo: texto.slice(0,60),
        data: Date.now()
      });
    }

    // Auto-salvar progresso da jornada
    if(state.modulo?.id === "jornada" && state.tempKey){
      const diaMatch = reply.match(/[Dd]ia\s+(\d+)/);
      const diaAtual = diaMatch ? parseInt(diaMatch[1]) : 1;
      salvarJornada(state.tempKey, diaAtual, novasMsgs);
    }

  } catch(e){
    console.error(e && e.message ? e.message : e);
    setState({msgs:[...hist,{role:"assistant",content:"Respira, florzinha… tive uma pausa. Pode tentar de novo? 🌸"}], loading:false});
  }
}

function flores(cor="#c2845a"){
  const itens = ["🌸","🌸","🌸","🌼","🌸","🌸","🌼","🌸","🌸","🌼"];
  const tops  = [5, 12, 30, 22, 45, 58, 65, 78, 88, 94];
  const lefts = [6, 85, 92, 18, 4, 88, 55, 10, 78, 35];
  const sizes = [26, 32, 22, 30, 34, 24, 30, 26, 22, 28];
  const opacs = [0.35, 0.30, 0.28, 0.32, 0.38, 0.30, 0.32, 0.35, 0.28, 0.30];
  return `<div class="flores">${itens.map((f,i)=>`
    <span class="flor" style="font-size:${sizes[i]}px;top:${tops[i]}%;left:${lefts[i]}%;color:${cor};opacity:${opacs[i]};animation-duration:${4+i*.7}s;animation-delay:${i*.6}s">${f}</span>`).join("")}</div>`;
}

}

          </div>
          <div class="card" style="margin-bottom:14px">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:10px">Como se comunicar melhor</p>
            <p style="font-family:'Nunito',sans-serif;font-size:14px;color:#4a2c1a;line-height:1.75">${conv.comunicacao}</p>
          </div>
          <div class="card" style="margin-bottom:14px">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:12px">Exercícios práticos</p>
            ${conv.exercicios.map(d=>`<div style="display:flex;gap:10px;margin-bottom:10px"><span style="color:${tk.cor};flex-shrink:0">•</span><p style="font-family:'Nunito',sans-serif;font-size:14px;color:#4a2c1a;line-height:1.65">${d}</p></div>`).join("")}
          </div>
          <div class="card" style="margin-bottom:24px;border-left:3px solid ${tk.cor}">
            <p style="font-family:'Cormorant Garamond',serif;font-size:16px;color:${tk.corTexto};line-height:1.6;font-style:italic">${conv.versiculo}</p>
          </div>
        </div>
        ${navbar()}
      </div>`;
    }
    return;
  }

  // ─── JORNADA ─────────────────────────────────────────────────────────────────
  if(state.tela==="jornada"){
    if(!state.tempKey){ setState({tela:"modulos"}); return; }
    const tk = TEMAS[state.tempKey];
    const dias = JORNADA_DATA[state.tempKey];
    const diaIdx = state.diaJornada || 0;
    if(diaIdx === 0){
      app.innerHTML = `
      <div style="width:100%;min-height:100vh;background:${tk.bg};position:relative;padding-bottom:100px">
        ${flores(tk.cor)}
        <div class="fu" style="position:relative;z-index:1;padding:52px 22px 0">
          <button onclick="setState({tela:'modulos'})" style="background:none;border:none;cursor:pointer;font-size:22px;color:${tk.corTexto};margin-bottom:16px;display:block">←</button>
          <div style="text-align:center;margin-bottom:24px">
            <div style="font-size:40px;margin-bottom:8px">🌱</div>
            <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:${tk.corTexto};margin-bottom:8px">Jornada de 21 Dias</h2>
            <p style="font-family:'Nunito',sans-serif;font-size:13px;color:${tk.corTexto};opacity:.7">${tk.emoji} ${tk.nome} · 3 semanas de transformação</p>
          </div>
          ${["ME CONHECENDO","ENTENDENDO O OUTRO","VIVENDO MAIS LEVE"].map((semana,si)=>`
          <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.6;margin:${si>0?'20px':'0'} 0 10px">Semana ${si+1} — ${semana}</p>
          ${dias.filter(d=>d.semana===semana).map((d,i)=>{
            const diaNum = si*7 + i + 1;
            return `<button class="modcard" onclick="setState({tela:'jornada',diaJornada:${diaNum}})">
              <div style="width:36px;height:36px;border-radius:50%;background:${tk.corClara};display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:${tk.corTexto};flex-shrink:0">${diaNum}</div>
              <div><p style="font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:${tk.corTexto}">Dia ${diaNum}</p><p style="font-family:'Nunito',sans-serif;font-size:12px;color:#666">${d.titulo}</p></div>
              <span style="color:${tk.corTexto};opacity:.35;font-size:20px;margin-left:auto">›</span>
            </button>`;
          }).join("")}`).join("")}
        </div>
        ${navbar()}
      </div>`;
    } else {
      const dia = dias[diaIdx-1];
      app.innerHTML = `
      <div style="width:100%;min-height:100vh;background:${tk.bg};position:relative;padding-bottom:100px">
        ${flores(tk.cor)}
        <div class="fu" style="position:relative;z-index:1;padding:52px 22px 0">
          <button onclick="setState({tela:'jornada',diaJornada:0})" style="background:none;border:none;cursor:pointer;font-size:22px;color:${tk.corTexto};margin-bottom:16px;display:block">←</button>
          <div style="text-align:center;margin-bottom:24px">
            <p style="font-family:'Nunito',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:4px">Dia ${diaIdx} de 21 · ${dia.semana}</p>
            <div style="height:4px;background:rgba(0,0,0,0.08);border-radius:2px;overflow:hidden;margin-bottom:16px"><div style="height:100%;width:${(diaIdx/21)*100}%;background:${tk.cor};border-radius:2px"></div></div>
            <h2 style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:${tk.corTexto}">${dia.titulo}</h2>
          </div>
          <div class="card" style="margin-bottom:14px">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:10px">🌿 Reflexão</p>
            <p style="font-family:'Nunito',sans-serif;font-size:14px;color:#4a2c1a;line-height:1.75">${dia.reflexao}</p>
          </div>
          <div class="card" style="margin-bottom:14px;background:${tk.corClara};border-left:3px solid ${tk.cor}">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:8px">💬 Frase do dia</p>
            <p style="font-family:'Cormorant Garamond',serif;font-size:18px;color:${tk.corTexto};line-height:1.5;font-style:italic">${dia.frase}</p>
          </div>
          <div class="card" style="margin-bottom:14px">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:10px">🎯 Desafio</p>
            <p style="font-family:'Nunito',sans-serif;font-size:14px;color:#4a2c1a;line-height:1.75">${dia.desafio}</p>
          </div>
          <div class="card" style="margin-bottom:24px;background:${tk.corClara}">
            <p style="font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${tk.corTexto};opacity:.7;margin-bottom:10px">🙏 Oração</p>
            <p style="font-family:'Nunito',sans-serif;font-size:14px;color:#4a2c1a;line-height:1.75;font-style:italic">${dia.oracao}</p>
          </div>
          ${diaIdx < 21 ? `
          <button class="btn" onclick="setState({tela:'jornada',diaJornada:${diaIdx+1}})" style="background:${tk.cor};color:white;box-shadow:0 6px 18px ${tk.cor}44">
            Próximo dia →
          </button>` : `
          <div class="card" style="text-align:center;margin-bottom:16px">
            <p style="font-family:'Cormorant Garamond',serif;font-size:20px;color:${tk.corTexto};font-style:italic">🌸 Você completou os 21 dias!</p>
            <p style="font-family:'Nunito',sans-serif;font-size:13px;color:#888;margin-top:8px">Parabéns! Você floresceu. Continue sendo você. 🌸</p>
          </div>`}
        </div>
        ${navbar()}
      </div>`;
    }
    return;
  }
}

render();
</script>
</body>
</html>
